<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LIKETY | CONFIG GEN</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;background:#000;color:#fff;min-height:100vh;padding:40px 20px;position:relative}body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(transparent 50%,rgba(255,255,255,.02) 50%);background-size:100% 4px;pointer-events:none;z-index:1;animation:scanline 8s linear infinite}@keyframes scanline{0%{transform:translateY(0)}100%{transform:translateY(4px)}}.container{max-width:1200px;margin:0 auto;position:relative;z-index:2}.terminal{background:#0a0a0a;border:2px solid #333;box-shadow:0 0 50px rgba(255,255,255,.1)}.terminal-header{background:#1a1a1a;border-bottom:2px solid #333;padding:12px 16px;display:flex;align-items:center;gap:8px}.terminal-dot{width:12px;height:12px;border:1px solid #444;background:#222}.terminal-title{margin-left:auto;color:#666;font-size:12px;letter-spacing:1px}.terminal-body{padding:40px}.section{border:1px solid #333;padding:25px;margin-bottom:20px;background:#0f0f0f}.section-title{font-size:16px;letter-spacing:2px;margin-bottom:20px;color:#fff;border-bottom:1px solid #333;padding-bottom:10px;padding-left:20px;position:relative}.section-title::after{content:'>';position:absolute;left:0;animation:blink 1s step-end infinite}@keyframes blink{50%{opacity:.3}}.control-group{margin-bottom:20px}.control-label{display:inline-block;color:#888;font-size:12px;letter-spacing:1px;margin-bottom:8px;position:relative;cursor:help}[data-tooltip]{position:relative}[data-tooltip]::after,[data-tooltip]::before{position:absolute;left:50%;transform:translateX(-50%) translateY(5px);opacity:0;visibility:hidden;transition:all .2s ease-in-out;z-index:9999;pointer-events:none}[data-tooltip]::after{content:attr(data-tooltip);bottom:125%;background:#0a0a0a;border:1px solid #666;color:#fff;padding:8px 12px;font-size:11px;min-width:200px;width:max-content;max-width:300px;white-space:normal;box-shadow:0 4px 15px rgba(0,0,0,.9);border-radius:4px}[data-tooltip]::before{content:'';bottom:115%;border:6px solid transparent;border-top-color:#666}[data-tooltip]:hover::after,[data-tooltip]:hover::before{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}.toggle-container{display:inline-block;position:relative}.toggle-input{display:none}.toggle-switch{display:block;width:50px;height:26px;background:#1a1a1a;border:1px solid #444;position:relative;cursor:pointer;transition:all .3s}.toggle-switch::before{content:'';position:absolute;width:18px;height:18px;background:#666;top:2px;left:2px;transition:all .3s;border:1px solid #444}.toggle-input:checked+.toggle-switch{background:#2a2a2a;border-color:#666}.toggle-input:checked+.toggle-switch::before{left:26px;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.5)}.toggle-switch:hover{border-color:#666}.slider-container{position:relative}.slider{-webkit-appearance:none;width:100%;height:2px;background:#333;outline:0;position:relative}.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:#fff;cursor:pointer;border:1px solid #666;transition:all .2s}.slider::-moz-range-thumb{width:16px;height:16px;background:#fff;cursor:pointer;border:1px solid #666;transition:all .2s}.slider::-webkit-slider-thumb:hover{box-shadow:0 0 10px rgba(255,255,255,.5);transform:scale(1.2)}.slider::-moz-range-thumb:hover{box-shadow:0 0 10px rgba(255,255,255,.5);transform:scale(1.2)}.slider-value{display:inline-block;color:#fff;font-size:13px;margin-left:10px;min-width:40px}.input-field{width:100%;background:#1a1a1a;border:1px solid #444;color:#fff;padding:10px;font-family:'Courier New',monospace;font-size:13px;outline:0;transition:all .3s}.input-field:focus{border-color:#666;box-shadow:0 0 10px rgba(255,255,255,.1)}.toggle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}.toggle-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#1a1a1a;border:1px solid #333}.toggle-item:hover{border-color:#444}.emote-list{max-height:400px;overflow-y:auto;border:1px solid #333;background:#1a1a1a;padding:10px}.emote-list::-webkit-scrollbar{width:8px}.emote-list::-webkit-scrollbar-track{background:#0a0a0a}.emote-list::-webkit-scrollbar-thumb{background:#333;border:1px solid #222}.emote-list::-webkit-scrollbar-thumb:hover{background:#444}.emote-item{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;margin-bottom:10px;align-items:center}.emote-item input{background:#0f0f0f;border:1px solid #333;color:#fff;padding:8px;font-family:'Courier New',monospace;font-size:12px}.emote-item input:focus{outline:0;border-color:#555}.btn{background:#1a1a1a;border:1px solid #444;color:#fff;padding:12px 24px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:1px;background:linear-gradient(90deg,transparent,#fff,transparent);transition:left .8s}.btn:hover{border-color:#666;background:#222}.btn:hover::before{left:100%}.btn-primary{background:#2a2a2a;border-color:#555}.btn-small{padding:6px 12px;font-size:11px}.button-row{display:flex;gap:10px;margin-top:30px;justify-content:center}.toast{position:fixed;top:20px;right:20px;background:#fff;color:#000;padding:15px 25px;border:2px solid #000;font-size:13px;letter-spacing:1px;z-index:1000;opacity:0;transform:translateX(400px);transition:all .3s}.toast.show{opacity:1;transform:translateX(0)}@media (max-width:768px){.terminal-body{padding:20px}.toggle-grid{grid-template-columns:1fr}.button-row{flex-direction:column}}</style></head><body><center><h1>Made by <a style="text-decoration: underline; color: #888;" href="https://likety.lol/">LIKETY</a></h1></center><div class="container"><div class="terminal"><div class="terminal-header"><div class="terminal-dot"></div><div class="terminal-dot"></div><div class="terminal-dot"></div><div class="terminal-title">"ANIMA" CONFIG GENERATOR</div></div><div class="terminal-body"><div class="section"><div class="section-title" data-tooltip="Global settings for the menu.">GLOBAL SETTINGS</div><div class="control-group"><label class="control-label" data-tooltip="The key that opens the menu. Default is '-' (numpad).">MENU KEY</label><select class="input-field" id="menuKey"></select></div><div class="control-group"><label class="control-label" data-tooltip="The key that opens the menu when the menu is already open. Default is '*' (numpad).">MINIMAL MENU KEY</label><select class="input-field" id="minimalMenuKey"></select></div><div class="control-group"><label class="control-label" data-tooltip="Enables smooth dragging of the emote grid. Default is disabled.">SMOOTH DRAG</label><br><div class="toggle-container"><input type="checkbox" id="smoothDrag" class="toggle-input"><label for="smoothDrag" class="toggle-switch"></label></div></div></div><div class="section"><div class="section-title" data-tooltip="The size of the main window. Default is 350x250.">WINDOW SIZE</div><div class="control-group"><label class="control-label" data-tooltip="The width of the main window. Default is 350.">WIDTH</label><div class="slider-container"><input type="range" class="slider" id="windowWidth" min="200" max="800" step="10" value="350"><span class="slider-value" id="windowWidthValue">350</span></div></div><div class="control-group"><label class="control-label" data-tooltip="The height of the main window. Default is '250'.">HEIGHT</label><div class="slider-container"><input type="range" class="slider" id="windowHeight" min="150" max="600" step="10" value="250"><span class="slider-value" id="windowHeightValue">250</span></div></div></div><div class="section"><div class="section-title" data-tooltip="Emote grid configuration settings. Default is 3 rows, 3 columns, and 5 spacing.">GRID CONFIGURATION</div><div class="control-group"><label class="control-label" data-tooltip="The number of rows in the emote grid. Default is 3.">ROWS</label><div class="slider-container"><input type="range" class="slider" id="gridRows" min="1" max="10" step="1" value="3"><span class="slider-value" id="gridRowsValue">3</span></div></div><div class="control-group"><label class="control-label" data-tooltip="The number of columns in the emote grid. Default is 3.">COLUMNS</label><div class="slider-container"><input type="range" class="slider" id="gridCols" min="1" max="10" step="1" value="3"><span class="slider-value" id="gridColsValue">3</span></div></div><div class="control-group"><label class="control-label" data-tooltip="The spacing between emote grid cells. Default is 5.">SPACING</label><div class="slider-container"><input type="range" class="slider" id="gridSpacing" min="0" max="20" step="1" value="5"><span class="slider-value" id="gridSpacingValue">5</span></div></div></div><div class="section"><div class="section-title" data-tooltip="Enables or disables specific animations. Default is enabled for all.">ANIMATION SETTINGS</div><div class="toggle-grid" id="animationGrid"></div></div><div class="section"><div class="section-title" data-tooltip="The list of emotes to use.">EMOTES CONFIGURATION</div><div class="emote-list" id="emoteList"></div><button class="btn btn-small" style="margin-top:10px" onclick="createNewEmote()">+ ADD EMOTE</button></div><div class="button-row"><button class="btn btn-primary" onclick="generateLuaConfig()">GENERATE CONFIG</button><button class="btn" onclick="copyConfigToClipboard()">COPY TO CLIPBOARD</button><button class="btn" onclick="downloadLuaFile()">DOWNLOAD FILE</button></div></div></div></div><div class="toast" id="notificationToast">✓ Copied to clipboard!</div><script>const animationSettings=[{name:"ALL",enabled:!0},{name:"Swim",enabled:!1},{name:"SwimIdle",enabled:!1},{name:"RunAnim",enabled:!1},{name:"WalkAnim",enabled:!1},{name:"FallAnim",enabled:!1},{name:"JumpAnim",enabled:!1},{name:"ClimbAnim",enabled:!1},{name:"Animation1",enabled:!1}];let registeredEmotes=[{name:"0 id",id:0},{name:"needy stretch",id:93358488237387},{name:"L",id:81809682819287},{name:"aura fly",id:0x7d3ddea8b5dd},{name:"basketball",id:0x7dbb4821a2e1}];const keyMappings=[{label:"Middle Mouse",value:"0x04"},{label:"Backspace",value:"0x08"},{label:"Tab",value:"0x09"},{label:"Shift",value:"0x10"},{label:"Ctrl",value:"0x11"},{label:"Alt",value:"0x12"},{label:"Pause",value:"0x13"},{label:"Caps Lock",value:"0x14"},{label:"Esc",value:"0x1B"},{label:"Page Up",value:"0x21"},{label:"Page Down",value:"0x22"},{label:"End",value:"0x23"},{label:"Home",value:"0x24"},{label:"Left Arrow",value:"0x25"},{label:"Up Arrow",value:"0x26"},{label:"Right Arrow",value:"0x27"},{label:"Down Arrow",value:"0x28"},{label:"Insert",value:"0x2D"},{label:"Delete",value:"0x2E"},...Array.from({length:10},((e,n)=>({label:`${n}`,value:`0x${(48+n).toString(16).toUpperCase()}`}))),...Array.from({length:26},((e,n)=>({label:String.fromCharCode(65+n),value:`0x${(65+n).toString(16).toUpperCase()}`}))),...Array.from({length:10},((e,n)=>({label:`Numpad ${n}`,value:`0x${(96+n).toString(16).toUpperCase()}`}))),{label:"* (Numpad)",value:"0x6A"},{label:"+ (Numpad)",value:"0x6B"},{label:"Separator",value:"0x6C"},{label:"Subtract (-)",value:"0x6D"},{label:"Decimal (.)",value:"0x6E"},{label:"Divide (/)",value:"0x6F"},...Array.from({length:12},((e,n)=>({label:`F${n+1}`,value:`0x${(112+n).toString(16).toUpperCase()}`})))];function populateKeySelects(){const e=document.getElementById("menuKey"),n=document.getElementById("minimalMenuKey");e.innerHTML="",n.innerHTML="",keyMappings.forEach((t=>{const a=new Option(t.label,t.value);e.add(a.cloneNode(!0)),n.add(a.cloneNode(!0))})),e.value="0x6D",n.value="0x6A"}function setupSliderListeners(){[{inputId:"windowWidth",displayId:"windowWidthValue"},{inputId:"windowHeight",displayId:"windowHeightValue"},{inputId:"gridRows",displayId:"gridRowsValue"},{inputId:"gridCols",displayId:"gridColsValue"},{inputId:"gridSpacing",displayId:"gridSpacingValue"}].forEach((e=>{const n=document.getElementById(e.inputId),t=document.getElementById(e.displayId);n&&t&&n.addEventListener("input",(function(){t.textContent=e.precision?parseFloat(this.value).toFixed(e.precision):this.value}))}))}function buildAnimationToggles(){const e=document.getElementById("animationGrid");e.innerHTML="",animationSettings.forEach(((n,t)=>{const a=document.createElement("div");a.className="toggle-item",a.innerHTML=`\n                <span style="color: #fff; font-size: 12px;">${n.name}</span>\n                <div class="toggle-container">\n                    <input type="checkbox" id="anim_toggle_${t}" class="toggle-input" ${n.enabled?"checked":""} \n                        onchange="updateAnimationSetting(${t}, this.checked)">\n                    <label for="anim_toggle_${t}" class="toggle-switch"></label>\n                </div>\n            `,e.appendChild(a)}))}function updateAnimationSetting(e,n){if(animationSettings[e].enabled=n,n)if(0===e)for(let e=1;e<animationSettings.length;e++){animationSettings[e].enabled=!1;const n=document.getElementById(`anim_toggle_${e}`);n&&(n.checked=!1)}else{animationSettings[0].enabled=!1;const e=document.getElementById("anim_toggle_0");e&&(e.checked=!1)}}function refreshEmoteUI(){const e=document.getElementById("emoteList");e.innerHTML="",registeredEmotes.forEach(((n,t)=>{const a=document.createElement("div");a.className="emote-item",a.innerHTML=`\n                <input type="text" placeholder="Name" value="${n.name}" onchange="modifyEmoteData(${t}, 'name', this.value)">\n                <input type="number" placeholder="ID" value="${n.id}" onchange="modifyEmoteData(${t}, 'id', this.value)">\n                <button class="btn btn-small" onclick="deleteEmote(${t})">DELETE</button>\n            `,e.appendChild(a)}))}function createNewEmote(){registeredEmotes.push({name:"new emote",id:0}),refreshEmoteUI()}function deleteEmote(e){registeredEmotes.splice(e,1),refreshEmoteUI()}function modifyEmoteData(e,n,t){registeredEmotes[e][n]=t}function generateLuaConfig(){const e=document.getElementById("menuKey").value,n=document.getElementById("minimalMenuKey").value,t=document.getElementById("smoothDrag").checked,a=document.getElementById("windowWidth").value,l=document.getElementById("windowHeight").value,i=document.getElementById("gridRows").value,o=document.getElementById("gridCols").value,d=document.getElementById("gridSpacing").value;let m="local Config = {}\n\n";return m+="-- Global settings\n",m+="Config.Settings = {\n",m+="    PADDING_PERCENT = 0.025,\n",m+="    TITLE_HEIGHT = 30,\n",m+="    FOOTER_HEIGHT = 25,\n",m+=`    MenuKey = ${e},         --  - Key (numpad subtract)\n`,m+=`    MinimalMenuKey = ${n},  --  * Key (numpad multiply)\n`,m+=`    SmoothDrag = ${t},      -- Smooth window dragging *works fine with good cpu* (uses more CPU & crash on "restart VM")\n`,m+="}\n\n",m+="-- Window size\n",m+="Config.Window = {\n",m+=`    --Size = Vector2.new(${a}, ${l})\n`,m+=`    Size = Vector2.new(${a}, ${l})\n`,m+="}\n\n",m+="-- Grid size of the emotes\n",m+="Config.Grid = {\n",m+=`    ROWS = ${i},\n`,m+=`    COLS = ${o},\n`,m+=`    SPACING = ${d}\n`,m+="}\n\n",m+="-- NOTE: \n",m+="-- Config.Animate and Config.Emotes can be updated at runtime\n",m+="-- by pressing the MenuKey or MinimalMenuKey\n\n",m+="-- Play the emote only on specific animations / all\n",m+="-- Ex: enable RunAnim will play the emote only when the character is running\n",m+="Config.Animate = {\n",animationSettings.forEach(((e,n)=>{const t=n<animationSettings.length-1?",":"";m+=`    {name="${e.name}", enabled=${e.enabled}}${t}\n`})),m+="}\n\n",m+="-- Emotes list\n",m+="Config.Emotes = {\n",registeredEmotes.forEach(((e,n)=>{const t=n<registeredEmotes.length-1?",":"";m+=`    {name="${e.name}",id=${e.id}}${t}\n`})),m+="}\n\n",m+="return Config",m}function copyConfigToClipboard(){const e=generateLuaConfig();navigator.clipboard.writeText(e).then((()=>{const e=document.getElementById("notificationToast");e.classList.add("show"),setTimeout((()=>{e.classList.remove("show")}),3e3)})).catch((e=>{console.error("Failed to copy: ",e),alert("Failed to copy to clipboard")}))}function downloadLuaFile(){const e=generateLuaConfig(),n=new Blob([e],{type:"text/plain"}),t=window.URL.createObjectURL(n),a=document.createElement("a");a.href=t,a.download="config.lua",document.body.appendChild(a),a.click(),window.URL.revokeObjectURL(t),document.body.removeChild(a)}setupSliderListeners(),buildAnimationToggles(),refreshEmoteUI(),populateKeySelects();</script></body></html>
